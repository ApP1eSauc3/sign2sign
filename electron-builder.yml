appId: com.sign2sign.admin
productName: Sign2Sign Admin
copyright: "Copyright © 2026 Sign2Sign"

# Flip Electron Fuses after packaging, before signing (security checklist #19).
# Implementation lives in build/ (not electron/) to keep the shell logic-free.
afterPack: build/afterPack.js

# electron-builder uses package.json's main field by default, but Expo sets
# main to the mobile entry point. Override it here for the packaged build only.
extraMetadata:
  main: electron/main.js

directories:
  output: release/
  buildResources: assets/

# Files to include in the package. The Expo web build goes in dist/, the
# Electron main process and preload live in electron/.
files:
  - dist/**/*
  - electron/main.js
  - electron/preload.js
  - package.json

asar: true

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.business
  icon: assets/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  # entitlements and entitlementsInherit are required for notarization
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  # Notarization (hardened runtime). electron-builder runs Apple's notarytool
  # using App Store Connect API key credentials from electron-build.env:
  #   APPLE_API_KEY       Path to the .p8 key file (e.g. ~/private_keys/AuthKey_*.p8)
  #   APPLE_API_KEY_ID    10-char key ID from App Store Connect → Users and Access → Integrations
  #   APPLE_API_ISSUER    UUID issuer ID from the same page
  # `source electron-build.env` before running `npm run electron:build:mac`.
  # Signing also needs a "Developer ID Application" cert in your login Keychain.
  notarize: true
  # Force hyphenated DMG filenames. Without this, electron-builder writes the
  # product name with a space ("Sign2Sign Admin-1.0.0.dmg"), GitHub Releases
  # sanitizes the space to a dot in asset URLs ("Sign2Sign.Admin-1.0.0.dmg"),
  # but electron-updater's latest-mac.yml expects hyphens — three conventions,
  # no agreement, auto-updater 404s. Hyphenating from the start aligns all three.
  artifactName: Sign2Sign-Admin-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch: [x64, arm64]  # Intel + Apple Silicon

dmg:
  title: Sign2Sign Admin
  icon: assets/icon.png
  window:
    width: 540
    height: 380

# ─── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sign2Sign Admin
  # Custom NSIS script that registers the sign2sign:// protocol on Windows install
  # and removes it on uninstall. electron-builder's protocols key is macOS-only.
  include: electron/installer.nsh

# ─── Protocol handler ─────────────────────────────────────────────────────────
# Registers sign2sign:// with the OS so Google OAuth can redirect back after
# the user approves permissions in their browser.
# Also add sign2sign://oauth to your Google Cloud Console redirect URIs.
#
# NOTE: electron-builder's `protocols` key only registers the scheme on macOS
# (via Info.plist CFBundleURLTypes). On Windows, NSIS must write the registry
# entries — see electron/installer.nsh which is referenced by nsis.include below.
protocols:
  - name: Sign2Sign
    schemes:
      - sign2sign

# ─── Publish (auto-updater) ───────────────────────────────────────────────────
# Feeds the electron-updater code in main.js. electron-builder bakes owner/repo
# into the packaged app (app-update.yml) so the app knows where to check for new
# releases. Publishing a release needs GH_TOKEN (repo scope) in the environment;
# the repo is public, so end users download updates without any token.
publish:
  provider: github
  owner: ApP1eSauc3
  repo: sign2sign
